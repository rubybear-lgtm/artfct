name: release-cli

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows:
      - ci
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.1.0'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub Release as a prerelease'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@a02741459ec5e501b9843ed30b535ca0a0376ae4 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build -p artfct --release --locked --target ${{ matrix.target }}

      - name: Package CLI
        shell: bash
        run: |
          set -euo pipefail
          asset="artfct-${{ matrix.target }}"
          mkdir -p "dist/${asset}"
          cp "target/${{ matrix.target }}/release/artfct" "dist/${asset}/artfct"
          chmod 755 "dist/${asset}/artfct"
          tar -C "dist/${asset}" -czf "dist/${asset}.tar.gz" artfct

      - name: Upload release asset artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artfct-${{ matrix.target }}
          path: dist/artfct-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: publish GitHub Release
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    needs:
      - build

    env:
      GH_TOKEN: ${{ github.token }}
      REQUESTED_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      IS_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
      TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        shell: bash
        run: |
          set -euo pipefail

          release_tag="$REQUESTED_RELEASE_TAG"

          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' mcp-server/Cargo.toml | head -n 1)"
            release_tag="v${version}"
          fi

          if gh release view "$release_tag" >/dev/null 2>&1; then
            echo "Release ${release_tag} already exists; skipping."
            exit 0
          fi

          flags=(--title "$release_tag" --generate-notes --target "$TARGET_SHA")

          if [ "$IS_PRERELEASE" = "true" ]; then
            flags+=(--prerelease)
          fi

          gh release create "$release_tag" dist/*.tar.gz "${flags[@]}"
