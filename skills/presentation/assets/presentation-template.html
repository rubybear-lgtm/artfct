<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --base3:   #FDF6E3;
      --base2:   #EEE8D5;
      --base1:   #93A1A1;
      --base0:   #657B83;
      --base00:  #586E75;
      --base01:  #073642;
      --yellow:  #B58900;
      --orange:  #CB4B16;
      --red:     #DC322F;
      --magenta: #D33682;
      --violet:  #6C71C4;
      --blue:    #268BD2;
      --cyan:    #2AA198;
      --green:   #859900;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--base3);
      font-family: 'Instrument Sans', ui-sans-serif, system-ui, sans-serif;
      color: var(--base00);
    }

    /* ── slides ── */
    .deck {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4rem 6rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      text-align: center;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── slide types ── */
    .slide-title .kicker {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: clamp(10px, 1.2vw, 14px);
      letter-spacing: 0.12em;
      color: var(--base1);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .slide-title h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 700;
      color: var(--base01);
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .slide-title .subtitle {
      font-size: clamp(1rem, 2vw, 1.4rem);
      color: var(--base0);
      font-weight: 400;
    }

    .slide-content { align-items: flex-start; text-align: left; }

    .slide-content h2 {
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      font-weight: 700;
      color: var(--base01);
      margin-bottom: 1.75rem;
      width: 100%;
    }

    .slide-content h2::after {
      content: '';
      display: block;
      width: 3rem;
      height: 3px;
      background: var(--blue);
      margin-top: 0.6rem;
    }

    .slide-content ul {
      list-style: none;
      width: 100%;
    }

    .slide-content li {
      font-size: clamp(1rem, 2vw, 1.35rem);
      color: var(--base00);
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--base2);
      display: flex;
      gap: 0.75rem;
      align-items: baseline;
    }

    .slide-content li::before {
      content: '→';
      color: var(--blue);
      font-family: ui-monospace, monospace;
      flex-shrink: 0;
    }

    .slide-content p {
      font-size: clamp(1rem, 1.8vw, 1.25rem);
      color: var(--base0);
      line-height: 1.7;
      width: 100%;
    }

    .slide-content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.875em;
      background: var(--base2);
      color: var(--base00);
      padding: 0.15em 0.4em;
    }

    .slide-content pre {
      width: 100%;
      background: var(--base2);
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .slide-content pre code {
      background: none;
      padding: 0;
      font-size: clamp(0.75rem, 1.4vw, 0.95rem);
      line-height: 1.6;
    }

    .accent-bar {
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, var(--blue), var(--cyan), var(--green));
      position: fixed;
      top: 0;
      left: 0;
    }

    /* ── controls ── */
    .controls {
      position: fixed;
      bottom: 1.5rem;
      right: 1.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
    }

    .counter {
      color: var(--base1);
      letter-spacing: 0.05em;
    }

    .btn {
      background: none;
      border: 1px solid var(--base2);
      color: var(--base1);
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn:hover { border-color: var(--base00); color: var(--base00); }
    .btn:disabled { opacity: 0.3; cursor: default; }

    /* ── hint ── */
    .hint {
      position: fixed;
      bottom: 1.5rem;
      left: 1.75rem;
      font-family: ui-monospace, monospace;
      font-size: 10px;
      color: var(--base2);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="accent-bar"></div>

<div class="deck" id="deck">

  <!-- ── Slide 1: Title ── -->
  <section class="slide slide-title active">
    <p class="kicker">{{KICKER}}</p>
    <h1>{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
  </section>

  <!-- ── Slide 2: Content ── -->
  <section class="slide slide-content">
    <h2>{{SLIDE_2_HEADING}}</h2>
    <ul>
      <li>{{POINT_1}}</li>
      <li>{{POINT_2}}</li>
      <li>{{POINT_3}}</li>
    </ul>
  </section>

  <!-- ── Slide 3: Code / Detail ── -->
  <section class="slide slide-content">
    <h2>{{SLIDE_3_HEADING}}</h2>
    <pre><code>{{CODE_BLOCK}}</code></pre>
    <p>{{SLIDE_3_CAPTION}}</p>
  </section>

  <!-- ── Add more slides above this line ── -->

</div>

<div class="hint">← → space  navigate</div>

<div class="controls">
  <button class="btn" id="btn-prev" disabled>←</button>
  <span class="counter" id="counter">1 / 3</span>
  <button class="btn" id="btn-next">→</button>
</div>

<script>
  const slides = Array.from(document.querySelectorAll('.slide'));
  const counter = document.getElementById('counter');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  let current = 0;

  function go(n) {
    slides[current].classList.remove('active');
    current = Math.max(0, Math.min(n, slides.length - 1));
    slides[current].classList.add('active');
    counter.textContent = `${current + 1} / ${slides.length}`;
    btnPrev.disabled = current === 0;
    btnNext.disabled = current === slides.length - 1;
  }

  btnPrev.addEventListener('click', () => go(current - 1));
  btnNext.addEventListener('click', () => go(current + 1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown') {
      e.preventDefault();
      go(current + 1);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      go(current - 1);
    } else if (e.key === 'Home') {
      go(0);
    } else if (e.key === 'End') {
      go(slides.length - 1);
    }
  });

  // Touch/swipe
  let touchX = null;
  document.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; });
  document.addEventListener('touchend', (e) => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40) go(dx < 0 ? current + 1 : current - 1);
    touchX = null;
  });

  go(0);
</script>
</body>
</html>
